<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦊 Fox Run</title>

    <!-- Обязательно: Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game">

    <div class="top">
        <div>🦊 <span id="role">beta</span></div>
        <div>🔴 <span id="hunters">0</span></div>
        <div>⭐ <span id="score">0</span></div>
    </div>

    <!-- Если нужно, сюда можно подставлять номер игрока -->
    <div id="fox_number" style="display:none">UNKNOWN</div>

    <canvas id="canvas" width="450" height="450"></canvas>

    <div class="controls">
        <button id="up" disabled>▲</button>
        <div>
            <button id="left" disabled>◀</button>
            <button id="down" disabled>▼</button>
            <button id="right" disabled>▶</button>
        </div>
    </div>

    <div id="msg"></div>

</div>

<script src="game.js"></script>
</body>
</html>
